services:
  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: webhook-api
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: Europe/Stockholm

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL must be set in .env}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}

      HMAC_SECRET: ${HMAC_SECRET:?HMAC_SECRET must be set in .env}

      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}

      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env}

      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN must be set in .env}
      TENANT_ADMIN_TOKEN: ${TENANT_ADMIN_TOKEN:?TENANT_ADMIN_TOKEN must be set in .env}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}

      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://dashboard.example.com,https://automation.example.com}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-api.example.com,localhost}
      ALLOWED_HEADERS: ${ALLOWED_HEADERS:-Content-Type,Authorization,X-Signature,X-Timestamp,X-Tenant-ID,X-Request-ID,X-Admin-Token,X-Metrics-Token}

    ports:
      - "127.0.0.1:8000:8000"

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips=*

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    env_file:
      - .env
    environment:
      TZ: Europe/Stockholm
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    command: ["sh", "-lc", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    security_opt:
      - no-new-privileges:true

volumes:
  redisdata:
